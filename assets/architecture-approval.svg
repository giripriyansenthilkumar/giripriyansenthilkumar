<svg viewBox="0 0 950 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowAP" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8E2DE2"/>
    </marker>
    <style>
      .box { fill:#161b22; stroke:#2F80ED; stroke-width:1.5; }
      .lbl { font-family:monospace; font-size:13px; fill:#e6edf3; text-anchor:middle; }
      .sub { font-family:monospace; font-size:10px; fill:#8b949e; text-anchor:middle; }
      .flow { stroke:#8E2DE2; stroke-width:2.5; fill:none; stroke-dasharray:6 6; marker-end:url(#arrowAP); }
    </style>
  </defs>

  <text x="475" y="24" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#ffffff">AI Approval Process Portal — Architecture</text>

  <rect class="box" x="20"  y="70" width="200" height="70" rx="10"/>
  <text class="lbl" x="120" y="100">User Input</text>
  <text class="sub" x="120" y="118">Form + document upload</text>

  <rect class="box" x="270" y="70" width="200" height="70" rx="10"/>
  <text class="lbl" x="370" y="100">OCR Extraction</text>
  <text class="sub" x="370" y="118">EasyOCR reads document</text>

  <rect class="box" x="520" y="70" width="220" height="70" rx="10"/>
  <text class="lbl" x="630" y="100">Semantic Similarity</text>
  <text class="sub" x="630" y="118">TensorFlow text matching</text>

  <rect class="box" x="790" y="70" width="140" height="70" rx="10"/>
  <text class="lbl" x="860" y="100">Decision</text>
  <text class="sub" x="860" y="118">Approve / Reject</text>

  <path class="flow" d="M220,105 H270"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/></path>
  <path class="flow" d="M470,105 H520"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/></path>
  <path class="flow" d="M740,105 H790"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/></path>

  <text x="475" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Python · Flask · EasyOCR · TensorFlow</text>
</svg>
