        <tspan fill="#8E2DE2">BUILDING WITH GENERATIVE AI</tspan>&#160;&#160;&#160;&#160;•&#160;&#160;&#160;&#160;
        <tspan fill="#2F80ED">ALWAYS LEARNING</tspan>&#160;&#160;&#160;&#160;•&#160;&#160;&#160;&#160;
        <tspan fill="#8E2DE2">SPEECH + DEEP LEARNING</tspan>&#160;&#160;&#160;&#160;•&#160;&#160;&#160;&#160;
        <animate attributeName="x" values="900;-900" dur="14s" repeatCount="indefinite"/>
      </text>
      <text x="900" y="32">🟢 OPEN TO COLLABORATE&#160;&#160;&#160;&#160;•&#160;&#160;&#160;&#160;
        <tspan fill="#8E2DE2">BUILDING WITH GENERATIVE AI</tspan>&#160;&#160;&#160;&#160;•&#160;&#160;&#160;&#160;
        <tspan fill="#2F80ED">ALWAYS LEARNING</tspan>&#160;&#160;&#160;&#160;•&#160;&#160;&#160;&#160;
        <tspan fill="#8E2DE2">SPEECH + DEEP LEARNING</tspan>&#160;&#160;&#160;&#160;•&#160;&#160;&#160;&#160;
        <animate attributeName="x" values="1800;0" dur="14s" repeatCount="indefinite"/>
      </text>
    </g>
