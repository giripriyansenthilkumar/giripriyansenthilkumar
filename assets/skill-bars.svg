<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2F80ED"/>
      <stop offset="100%" stop-color="#8E2DE2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clipPy"><rect x="160" y="10" width="414" height="18" rx="9"/></clipPath>
    <clipPath id="clipMl"><rect x="160" y="52" width="392" height="18" rx="9"/></clipPath>
    <clipPath id="clipCv"><rect x="160" y="94" width="368" height="18" rx="9"/></clipPath>
    <clipPath id="clipNlp"><rect x="160" y="136" width="392" height="18" rx="9"/></clipPath>
    <clipPath id="clipFlask"><rect x="160" y="178" width="345" height="18" rx="9"/></clipPath>
    <clipPath id="clipDb"><rect x="160" y="220" width="322" height="18" rx="9"/></clipPath>
  </defs>

  <style>
    text { font-family: 'Trebuchet MS', monospace; fill: #c9d1d9; }
  </style>

  <!-- track backgrounds -->
  <rect x="160" y="10"  width="460" height="18" rx="9" fill="#1c2128"/>
  <rect x="160" y="52"  width="460" height="18" rx="9" fill="#1c2128"/>
  <rect x="160" y="94"  width="460" height="18" rx="9" fill="#1c2128"/>
  <rect x="160" y="136" width="460" height="18" rx="9" fill="#1c2128"/>
  <rect x="160" y="178" width="460" height="18" rx="9" fill="#1c2128"/>
  <rect x="160" y="220" width="460" height="18" rx="9" fill="#1c2128"/>

  <!-- filled levels -->
  <rect x="160" y="10"  width="414" height="18" rx="9" fill="url(#barFill)"/>
  <rect x="160" y="52"  width="392" height="18" rx="9" fill="url(#barFill)"/>
  <rect x="160" y="94"  width="368" height="18" rx="9" fill="url(#barFill)"/>
  <rect x="160" y="136" width="392" height="18" rx="9" fill="url(#barFill)"/>
  <rect x="160" y="178" width="345" height="18" rx="9" fill="url(#barFill)"/>
  <rect x="160" y="220" width="322" height="18" rx="9" fill="url(#barFill)"/>

  <!-- moving shine sweeps, clipped to each bar's own filled width -->
  <g clip-path="url(#clipPy)">
    <rect x="-140" y="10" width="140" height="18" fill="url(#shine)">
      <animate attributeName="x" values="-140;620" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g clip-path="url(#clipMl)">
    <rect x="-140" y="52" width="140" height="18" fill="url(#shine)">
      <animate attributeName="x" values="-140;620" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g clip-path="url(#clipCv)">
    <rect x="-140" y="94" width="140" height="18" fill="url(#shine)">
      <animate attributeName="x" values="-140;620" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g clip-path="url(#clipNlp)">
    <rect x="-140" y="136" width="140" height="18" fill="url(#shine)">
      <animate attributeName="x" values="-140;620" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g clip-path="url(#clipFlask)">
    <rect x="-140" y="178" width="140" height="18" fill="url(#shine)">
      <animate attributeName="x" values="-140;620" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g clip-path="url(#clipDb)">
    <rect x="-140" y="220" width="140" height="18" fill="url(#shine)">
      <animate attributeName="x" values="-140;620" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- labels -->
  <text x="0" y="24" font-size="14" font-weight="700">Python</text>
  <text x="0" y="66" font-size="14" font-weight="700">Machine Learning</text>
  <text x="0" y="108" font-size="14" font-weight="700">Computer Vision</text>
  <text x="0" y="150" font-size="14" font-weight="700">NLP / LLMs</text>
  <text x="0" y="192" font-size="14" font-weight="700">Flask / Backend</text>
  <text x="0" y="234" font-size="14" font-weight="700">MongoDB / SQL</text>

  <text x="630" y="24"  font-size="12" text-anchor="end" fill="#8b949e">90%</text>
  <text x="630" y="66"  font-size="12" text-anchor="end" fill="#8b949e">85%</text>
  <text x="630" y="108" font-size="12" text-anchor="end" fill="#8b949e">80%</text>
  <text x="630" y="150" font-size="12" text-anchor="end" fill="#8b949e">85%</text>
  <text x="630" y="192" font-size="12" text-anchor="end" fill="#8b949e">75%</text>
  <text x="630" y="234" font-size="12" text-anchor="end" fill="#8b949e">70%</text>
</svg>
