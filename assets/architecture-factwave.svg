<svg viewBox="0 0 1150 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowFW" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8E2DE2"/>
    </marker>
    <style>
      .box { fill:#161b22; stroke:#2F80ED; stroke-width:1.5; }
      .lbl { font-family:monospace; font-size:13px; fill:#e6edf3; text-anchor:middle; }
      .sub { font-family:monospace; font-size:10px; fill:#8b949e; text-anchor:middle; }
      .flow { stroke:#8E2DE2; stroke-width:2.5; fill:none; stroke-dasharray:6 6; marker-end:url(#arrowFW); }
    </style>
  </defs>

  <text x="575" y="24" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#ffffff">FactWave — Real-Time Misinformation Detection</text>

  <rect class="box" x="20"  y="70" width="190" height="70" rx="10"/>
  <text class="lbl" x="115" y="100">Live Audio</text>
  <text class="sub" x="115" y="118">Streamed input</text>

  <rect class="box" x="250" y="70" width="200" height="70" rx="10"/>
  <text class="lbl" x="350" y="100">Speech-to-Text</text>
  <text class="sub" x="350" y="118">Whisper model</text>

  <rect class="box" x="490" y="70" width="200" height="70" rx="10"/>
  <text class="lbl" x="590" y="100">NLP Analysis</text>
  <text class="sub" x="590" y="118">Transformer models</text>

  <rect class="box" x="730" y="70" width="200" height="70" rx="10"/>
  <text class="lbl" x="830" y="100">Fact Comparison</text>
  <text class="sub" x="830" y="118">Verified dataset match</text>

  <rect class="box" x="970" y="70" width="160" height="70" rx="10"/>
  <text class="lbl" x="1050" y="100">Real-Time</text>
  <text class="sub" x="1050" y="118">Alert / Flag</text>

  <path class="flow" d="M210,105 H250"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/></path>
  <path class="flow" d="M450,105 H490"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/></path>
  <path class="flow" d="M690,105 H730"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/></path>
  <path class="flow" d="M930,105 H970"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/></path>

  <text x="575" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Flask · Whisper · Transformers</text>
</svg>
